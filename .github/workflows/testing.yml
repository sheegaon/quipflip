name: Trustworthy verification

on:
  push:
    branches: [main, "claude/**", "codex/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: verification-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  USE_PHRASE_VALIDATOR_API: "false"
  USE_SENTENCE_TRANSFORMERS: "false"
  CROWDCRAFT_TEST_SEED: "20260622"

jobs:
  backend:
    name: Deterministic backend
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt
      - name: Run deterministic backend gate
        shell: bash
        run: |
          mkdir -p artifacts
          set -o pipefail
          python scripts/verify.py backend 2>&1 | tee artifacts/backend.log
      - if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: backend-verification-log
          path: artifacts/backend.log
          if-no-files-found: ignore
          retention-days: 7

  sqlite-integration:
    name: Production SQLite integration
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run production-shaped SQLite gate
        shell: bash
        run: |
          mkdir -p artifacts
          set -o pipefail
          python scripts/verify.py sqlite-integration 2>&1 | tee artifacts/sqlite-integration.log
      - if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: sqlite-integration-log
          path: artifacts/sqlite-integration.log
          if-no-files-found: ignore
          retention-days: 7

  frontend:
    name: Frontend lint, typecheck, and builds
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run test:frontend-origins
      - name: Run every frontend gate
        shell: bash
        run: |
          mkdir -p artifacts
          set -o pipefail
          npm run frontend:verify 2>&1 | tee artifacts/frontend.log
      - if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: frontend-verification-log
          path: artifacts/frontend.log
          if-no-files-found: ignore
          retention-days: 7

  security:
    name: Dependency and secret audits
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"
          cache: pip
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20"
          cache: npm
      - run: pip install -r requirements.txt pip-audit
      - run: npm ci
      - run: python scripts/scan_secrets.py
      - run: node scripts/check_npm_audit.mjs
      - run: pip-audit -r requirements.txt
