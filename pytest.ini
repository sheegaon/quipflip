[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = --strict-markers -m "not sqlite_integration and not smoke and not stress and not external and not localhost"
markers =
    deterministic: fast, isolated tests with no network or external service dependency
    sqlite_integration: production-shaped, file-backed SQLite integration tests
    smoke: built-server or localhost transport tests
    stress: opt-in load and contention tests
    external: tests that require credentials or an external service
    localhost: tests that require a separately running localhost server
    owner_qf: QuipFlip subsystem
    owner_mm: MemeMint subsystem
    owner_ir: Initial Reaction subsystem
    owner_tl: ThinkLink subsystem
    owner_party: QuipFlip Party subsystem
    owner_platform: shared backend, database, auth, or repository tooling
